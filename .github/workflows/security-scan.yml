name: Security Scan

on:
  push:
    branches:    
      - '*'
      - '!main'


jobs:
  scan: 
    runs-on: ubuntu-latest
    permissions:
        contents: read # for checkout
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Trivy
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: config
        scan-ref: 'terraform'
        hide-progress: true
        format: 'json'
        output: 'trivy-results.json'
    - name: Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: terraform/
        soft_fail: true
        output_format: json
        output_file_path: checkov-results
    - name: Set up Python
      uses: actions/setup-python@v6 
      with:
        python-version: '3.13'
    - name: Install Python dependencies
      run: python -m pip install --upgrade pip pandas tabulate
    - name: Deduplication and OWASP mapping
      id: parse
      run: |
        HIGH_SEVERITY_FINDINGS=$(python scanner/scan.py)
        echo "HIGH_SEVERITY_FINDINGS=$HIGH_SEVERITY_FINDINGS">> $GITHUB_OUTPUT
    - name: Upload Security Report
      uses: actions/upload-artifact@v7
      with:
        name: Security Report
        path: security_report.md
    - name: Display Report in Summary
      run: cat security_report.md >> "$GITHUB_STEP_SUMMARY"
    - name: Fail if Critical or High Severity Findings
      if: steps.parse.outputs.HIGH_SEVERITY_FINDINGS == 'True'
      run: echo "⚠️  Job failed due to non-zero number of Critical or High severity security findings. See job summary for details." && exit 1
        