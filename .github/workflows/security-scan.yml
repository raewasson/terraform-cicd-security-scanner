name: Security Scan

on:
  pull_request:
    types: [opened, edited]

jobs:
  scan: 
    runs-on: ubuntu-latest
    permissions:
        contents: read # for checkout
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Trivy
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: config
        scan-ref: 'terraform'
        hide-progress: true
        format: 'sarif'
        output: 'trivy-results.sarif'
    - name: Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: terraform/
        output_format: sarif
        output_file_path: checkov-results.sarif
        