name: Security Scan

on:
  push:
    paths:
      - '**.tf'
    branches:    
      - '*'
      - '!main'


jobs:
  scan: 
    runs-on: ubuntu-latest
    permissions:
        contents: read # for checkout
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Trivy
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: config
        scan-ref: 'terraform'
        hide-progress: true
        format: 'json'
        output: 'trivy-results.json'
    - name: Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: terraform/
        soft_fail: true
        output_format: json
        output_file_path: checkov-results
    - name: Set up Python
      uses: actions/setup-python@v6 
      with:
        python-version: '3.13'
    - name: Install Python dependencies
      run: python -m pip install --upgrade pip pandas tabulate
    - name: Deduplication and OWASP mapping
      run: python scanner/scan.py
    - name: Upload Security Report
      uses: actions/upload-artifact@v7
      with:
        name: Security Report
        path: security_report.md
        